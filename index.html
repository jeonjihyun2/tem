<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专四刷题 · TEM-4 Practice</title>
  <style>
    :root {
      --primary: #4f46e5; --primary-light: #818cf8;
      --success: #10b981; --error: #ef4444; --warning: #f59e0b;
      --bg: #f1f5f9; --card: #ffffff; --text: #1e293b;
      --text-secondary: #64748b; --border: #e2e8f0;
      --shadow: 0 1px 3px rgba(0,0,0,0.06); --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.7; min-height: 100vh;
    }

    /* ===== Header ===== */
    .header {
      background: linear-gradient(135deg, #1e1b4b, #3730a3); color: white;
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
      box-shadow: var(--shadow-lg); position: sticky; top: 0; z-index: 200;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header-stats { display: flex; gap: 12px; font-size: 13px; }
    .header-stats span { background: rgba(255,255,255,0.12); padding: 4px 12px; border-radius: 20px; }
    .header-stats .vocab-badge { background: rgba(251,191,36,0.3); cursor: pointer; }

    /* ===== Layout ===== */
    .container { max-width: 920px; margin: 0 auto; padding: 20px 16px; }

    /* ===== Year Selector ===== */
    .year-selector { display: flex; gap: 8px; margin-bottom: 12px; }
    .year-btn {
      padding: 8px 20px; border: 2px solid var(--border); border-radius: 20px;
      cursor: pointer; font-weight: 600; font-size: 14px; background: var(--card);
      transition: all 0.2s;
    }
    .year-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .year-btn:hover:not(.active) { border-color: var(--primary-light); }

    /* ===== Mode Toggle ===== */
    .mode-toggle {
      display: flex; gap: 8px; margin-bottom: 12px; align-items: center;
      background: var(--card); padding: 6px; border-radius: 12px; box-shadow: var(--shadow);
    }
    .mode-btn {
      flex: 1; padding: 8px 14px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-weight: 600; background: transparent;
      color: var(--text-secondary); transition: all 0.2s;
    }
    .mode-btn.active { background: var(--primary); color: white; }
    .mode-btn:hover:not(.active) { background: #f1f5f9; }

    /* ===== Nav Tabs ===== */
    .nav-tabs {
      display: flex; gap: 6px; margin-bottom: 20px; background: var(--card);
      padding: 5px; border-radius: 12px; box-shadow: var(--shadow); overflow-x: auto;
    }
    .nav-tab {
      flex: 1; min-width: 70px; padding: 9px 12px; border: none; background: transparent;
      border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
      color: var(--text-secondary); white-space: nowrap; transition: all 0.2s;
    }
    .nav-tab.active { background: var(--primary); color: white; }
    .nav-tab:hover:not(.active) { background: #f1f5f9; }

    /* ===== Card ===== */
    .card {
      background: var(--card); border-radius: 14px; padding: 24px;
      box-shadow: var(--shadow); margin-bottom: 16px;
    }
    .card-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .card-title .icon { font-size: 20px; }

    /* ===== Question ===== */
    .q-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 8px; background: var(--primary);
      color: white; font-weight: 700; font-size: 13px; margin-right: 8px; flex-shrink: 0;
    }
    .q-num.correct { background: var(--success); }
    .q-num.wrong { background: var(--error); }

    .q-stem {
      font-size: 15px; margin-bottom: 14px; line-height: 1.8; display: flex; align-items: flex-start;
    }
    .q-stem span { cursor: pointer; }
    .q-stem span.word-clickable:hover { background: #fef3c7; border-radius: 3px; }
    .q-stem span.word-highlight { background: #fef3c7; border-radius: 3px; padding: 0 2px; }

    /* ===== Options ===== */
    .options-list { display: flex; flex-direction: column; gap: 6px; }
    .opt-btn {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      border: 2px solid var(--border); border-radius: 10px; cursor: pointer;
      transition: all 0.15s; background: white; font-size: 14px; text-align: left; width: 100%;
    }
    .opt-btn:hover:not(.disabled) { border-color: var(--primary-light); background: #faf5ff; }
    .opt-btn.selected { border-color: var(--primary); background: #ede9fe; }
    .opt-btn.correct { border-color: var(--success); background: #d1fae5; }
    .opt-btn.wrong { border-color: var(--error); background: #fee2e2; }
    .opt-btn.disabled { cursor: default; opacity: 0.7; }
    .opt-letter {
      width: 28px; height: 28px; border-radius: 7px; background: #f1f5f9;
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0;
    }
    .opt-btn.selected .opt-letter { background: var(--primary); color: white; }
    .opt-btn.correct .opt-letter { background: var(--success); color: white; }
    .opt-btn.wrong .opt-letter { background: var(--error); color: white; }

    /* ===== Explanation ===== */
    .explanation {
      margin-top: 12px; padding: 14px; background: #fffbeb;
      border-left: 4px solid var(--warning); border-radius: 8px;
      font-size: 13px; color: #92400e; line-height: 1.7; display: none;
    }
    .explanation.show { display: block; }
    .exp-tag {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      font-size: 12px; font-weight: 600; margin-bottom: 6px;
    }
    .exp-tag.correct { background: #d1fae5; color: #065f46; }
    .exp-tag.wrong { background: #fee2e2; color: #991b1b; }

    /* ===== Cloze ===== */
    .cloze-passage { font-size: 15px; line-height: 2.2; padding: 20px; background: #f8fafc; border-radius: 12px; margin-bottom: 16px; }
    .cloze-blank {
      display: inline-block; min-width: 70px; padding: 2px 10px;
      border-bottom: 2px dashed var(--primary); margin: 0 2px;
      color: var(--primary); font-weight: 600; cursor: pointer;
    }
    .cloze-blank.filled { border-bottom-color: var(--success); color: var(--success); }
    .cloze-blank.wrong-fill { border-bottom-color: var(--error); color: var(--error); }
    .cloze-blank.selected { background: #ede9fe; border-bottom-color: #7c3aed; color: #7c3aed; border-radius: 4px; }
    .word-bank { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .word-chip {
      padding: 6px 14px; border: 2px solid var(--border); border-radius: 18px;
      cursor: pointer; font-size: 13px; font-weight: 500; background: white; transition: all 0.15s;
    }
    .word-chip:hover { border-color: var(--primary-light); }
    .word-chip.active { border-color: var(--primary); background: #ede9fe; }
    .word-chip.used { opacity: 0.3; pointer-events: none; }

    /* ===== Buttons ===== */
    .btn {
      padding: 9px 20px; border: none; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #4338ca; }
    .btn-outline { background: white; border: 2px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-danger { background: var(--error); color: white; }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
    .actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

    /* ===== Vocabulary Popup ===== */
    .vocab-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); z-index: 500; display: flex;
      align-items: center; justify-content: center; animation: fadeIn 0.15s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .vocab-card {
      background: white; border-radius: 16px; padding: 24px; max-width: 420px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative; animation: slideUp 0.2s;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .vocab-card .close-btn {
      position: absolute; top: 12px; right: 14px; width: 28px; height: 28px;
      border-radius: 50%; border: none; background: #f1f5f9; cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);
    }
    .vocab-card .close-btn:hover { background: #e2e8f0; }
    .vocab-word { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
    .vocab-phonetic { font-size: 15px; color: var(--text-secondary); margin-bottom: 12px; }
    .vocab-meaning { font-size: 15px; margin-bottom: 8px; line-height: 1.7; }
    .vocab-example { font-size: 13px; color: var(--text-secondary); font-style: italic; background: #f8fafc; padding: 8px 12px; border-radius: 8px; }
    .vocab-actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-speak { background: #ede9fe; color: var(--primary); }
    .btn-speak:hover { background: #ddd6fe; }
    .btn-add-vocab { background: #fef3c7; color: #92400e; }
    .btn-add-vocab:hover { background: #fde68a; }
    .btn-add-vocab.added { background: #d1fae5; color: #065f46; }

    /* ===== Word Hover Tooltip ===== */
    .word-clickable {
      cursor: pointer; position: relative; display: inline;
      border-bottom: 1px dotted var(--primary-light); transition: background 0.15s;
    }
    .word-clickable:hover { background: #ede9fe; border-radius: 3px; }
    .word-tooltip {
      position: fixed; z-index: 600; background: white; border-radius: 12px;
      padding: 12px 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      max-width: 320px; pointer-events: none; animation: tooltipIn 0.15s ease;
      border: 1px solid var(--border); font-size: 13px;
    }
    @keyframes tooltipIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .word-tooltip .wt-word { font-size: 18px; font-weight: 700; color: var(--primary); }
    .word-tooltip .wt-phonetic { font-size: 13px; color: var(--text-secondary); margin: 4px 0 8px; }
    .word-tooltip .wt-meaning { font-size: 14px; color: var(--text); line-height: 1.6; }
    .word-tooltip .wt-example { font-size: 12px; color: var(--text-secondary); font-style: italic; margin-top: 6px; }
    .word-tooltip .wt-not-found { font-size: 13px; color: var(--warning); }

    /* ===== Vocab Book ===== */
    .vocab-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px; background: #f8fafc; border-radius: 10px; margin-bottom: 8px;
      cursor: pointer; transition: all 0.15s;
    }
    .vocab-item:hover { background: #f1f5f9; }
    .vocab-item .v-word { font-size: 16px; font-weight: 700; color: var(--primary); }
    .vocab-item .v-meaning { font-size: 13px; color: var(--text-secondary); }
    .vocab-item .v-phonetic { font-size: 12px; color: var(--text-secondary); }
    .vocab-delete {
      padding: 4px 10px; border: 1px solid #fecaca; border-radius: 6px;
      background: #fef2f2; color: var(--error); cursor: pointer; font-size: 12px;
    }
    .vocab-delete:hover { background: #fee2e2; }

    /* ===== Audio Player ===== */
    .audio-player {
      background: linear-gradient(135deg, #1e1b4b, #3730a3); border-radius: 14px;
      padding: 18px 20px; margin-bottom: 16px; color: white;
    }
    .audio-player .ap-title { font-size: 13px; opacity: 0.8; margin-bottom: 6px; }
    .audio-player .ap-info { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
    .audio-controls { display: flex; align-items: center; gap: 12px; }
    .btn-play {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.2); color: white; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .btn-play:hover { background: rgba(255,255,255,0.35); transform: scale(1.05); }
    .btn-play.playing { background: white; color: var(--primary); }
    .ap-progress-container { flex: 1; cursor: pointer; }
    .ap-progress-bar {
      height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px;
      position: relative; overflow: visible;
    }
    .ap-progress-fill {
      height: 100%; background: white; border-radius: 3px;
      position: relative; transition: width 0.1s linear;
    }
    .ap-progress-fill::after {
      content: ''; position: absolute; right: -5px; top: -4px;
      width: 14px; height: 14px; border-radius: 50%; background: white;
      opacity: 0; transition: opacity 0.15s;
    }
    .ap-progress-bar:hover .ap-progress-fill::after { opacity: 1; }
    .ap-time { font-size: 12px; opacity: 0.8; min-width: 85px; text-align: right; white-space: nowrap; }
    .ap-speed-btn {
      padding: 4px 10px; border: 1px solid rgba(255,255,255,0.3); border-radius: 14px;
      background: transparent; color: white; cursor: pointer; font-size: 11px; font-weight: 600;
      transition: all 0.15s; white-space: nowrap;
    }
    .ap-speed-btn:hover, .ap-speed-btn.active { background: rgba(255,255,255,0.2); }
    .ap-note { font-size: 11px; opacity: 0.7; margin-bottom: 8px; line-height: 1.5; }
    .ap-jump-btns { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .ap-jump-btn {
      padding: 5px 14px; border: 1px solid rgba(255,255,255,0.4); border-radius: 16px;
      background: rgba(255,255,255,0.1); color: white; cursor: pointer;
      font-size: 12px; font-weight: 500; transition: all 0.15s;
    }
    .ap-jump-btn:hover { background: rgba(255,255,255,0.3); border-color: white; }

    /* ===== Listening ===== */
    .listening-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .listening-item {
      display: flex; align-items: center; gap: 10px; padding: 10px;
      background: #f8fafc; border-radius: 8px;
    }
    .listening-num {
      width: 26px; height: 26px; border-radius: 6px; background: var(--primary);
      color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700;
    }
    .listening-input {
      flex: 1; padding: 7px 10px; border: 2px solid var(--border); border-radius: 7px; font-size: 13px;
    }
    .listening-input:focus { outline: none; border-color: var(--primary); }

    /* ===== Writing ===== */
    .writing-excerpt { background: #f1f5f9; padding: 18px; border-radius: 10px; margin: 12px 0; font-size: 14px; line-height: 1.8; white-space: pre-line; }
    .writing-textarea {
      width: 100%; min-height: 200px; padding: 14px; border: 2px solid var(--border);
      border-radius: 10px; font-size: 14px; resize: vertical; font-family: inherit; line-height: 1.8;
    }
    .writing-textarea:focus { outline: none; border-color: var(--primary); }
    .word-count { text-align: right; color: var(--text-secondary); font-size: 12px; margin-top: 6px; }

    /* ===== Wrong Book ===== */
    .wrong-item {
      padding: 12px 14px; border-radius: 10px; margin-bottom: 8px;
      background: #fef2f2; border: 1px solid #fecaca; font-size: 13px; line-height: 1.6;
    }
    .wrong-item .wrong-id { font-weight: 700; color: var(--error); margin-right: 6px; }

    /* ===== Misc ===== */
    .score-card { text-align: center; padding: 30px 20px; }
    .score-circle {
      width: 100px; height: 100px; border-radius: 50%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; margin: 0 auto 16px; border: 5px solid var(--primary);
    }
    .score-number { font-size: 30px; font-weight: 800; color: var(--primary); }
    .empty-state { text-align: center; padding: 50px 20px; color: var(--text-secondary); }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .progress-bar { height: 5px; background: var(--border); border-radius: 3px; margin: 10px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s; }
    .hint-text { font-size: 13px; color: var(--text-secondary); margin-bottom: 14px; padding: 10px; background: #f0f9ff; border-radius: 8px; }

    /* ===== Reading ===== */
    .reading-passage { font-size: 14px; line-height: 1.9; padding: 16px 20px; background: #f8fafc; border-radius: 12px; margin-bottom: 14px; color: var(--text); }
    .reading-passage p { margin-bottom: 10px; text-indent: 0; }
    .passage-title { font-weight: 700; color: var(--primary); margin-bottom: 8px; font-size: 15px; }
    .short-answer-card { background: #fffbeb; border-left: 4px solid var(--warning); border-radius: 8px; padding: 14px; margin-top: 12px; }
    .short-answer-card .sa-stem { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .short-answer-card .sa-ref { font-size: 13px; color: var(--text-secondary); font-style: italic; }

    /* ===== Vocab Drill ===== */
    .vocab-drill-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      background: #f8fafc; border-radius: 10px; margin-bottom: 8px; cursor: pointer;
      transition: all 0.15s;
    }
    .vocab-drill-item:hover { background: #f1f5f9; }
    .vocab-drill-item.flipped .vocab-drill-word { color: var(--success); }
    .vocab-drill-word { font-size: 16px; font-weight: 700; color: var(--primary); min-width: 140px; }
    .vocab-drill-meaning { font-size: 13px; color: var(--text-secondary); flex: 1; }
    .vocab-drill-type { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #ede9fe; color: var(--primary); white-space: nowrap; }
    .vocab-drill-type.n { background: #dbeafe; color: #1e40af; }
    .vocab-drill-type.v { background: #d1fae5; color: #065f46; }
    .vocab-drill-type.adj { background: #fef3c7; color: #92400e; }
    .vocab-drill-type.pro { background: #fce7f3; color: #9d174d; }
    .vocab-filter { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .vocab-filter-btn {
      padding: 5px 12px; border: 1px solid var(--border); border-radius: 14px;
      cursor: pointer; font-size: 12px; background: white; transition: all 0.15s;
    }
    .vocab-filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .dictation-box { background: #f0f9ff; border: 2px dashed var(--primary-light); border-radius: 12px; padding: 20px; margin: 14px 0; text-align: center; }
    .dictation-box .dictation-text { font-size: 18px; font-weight: 600; color: var(--primary); line-height: 1.8; }

    @media (max-width: 600px) {
      .container { padding: 12px 10px; } .card { padding: 16px; }
      .header { padding: 10px 14px; } .header h1 { font-size: 16px; }
      .header-stats { gap: 6px; font-size: 11px; }
      .listening-grid { grid-template-columns: 1fr; }
      .nav-tab { font-size: 11px; padding: 7px 8px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>📚 专四刷题 · TEM-4</h1>
    <div class="header-stats">
      <span id="correctCount">✅ 0</span>
      <span id="wrongCount">❌ 0</span>
      <span id="totalCount">📝 0</span>
      <span class="vocab-badge" onclick="switchTab('vocabbook')" title="生词本">📖 生词 <strong id="vocabCount">0</strong></span>
    </div>
  </header>

  <div class="container">
    <!-- Year Selector -->
    <div class="year-selector" id="yearSelector">
      <button class="year-btn active" data-year="2025">📅 2025年</button>
      <button class="year-btn" data-year="2024">📅 2024年</button>
    </div>

    <!-- Mode Toggle -->
    <div class="mode-toggle">
      <span style="font-size:13px; font-weight:600; color:var(--text-secondary); padding:0 8px;">答题模式：</span>
      <button class="mode-btn active" data-mode="instant">⚡ 即时判题</button>
      <button class="mode-btn" data-mode="batch">📋 全部提交</button>
    </div>

    <!-- Navigation -->
    <nav class="nav-tabs" id="navTabs">
      <button class="nav-tab active" data-tab="dictation">📻 听写</button>
      <button class="nav-tab" data-tab="listening">🎧 听力理解</button>
      <button class="nav-tab" data-tab="grammar">📖 语言知识</button>
      <button class="nav-tab" data-tab="cloze">✏️ 完形填空</button>
      <button class="nav-tab" data-tab="reading">📚 阅读理解</button>
      <button class="nav-tab" data-tab="writing">📝 写作</button>
    </nav>
    <nav class="nav-tabs" style="margin-top:6px;padding:3px 5px;" id="navSubTabs">
      <button class="nav-tab" data-tab="vocabdrill" style="font-size:11px;padding:5px 10px;">🔤 词汇</button>
      <button class="nav-tab" data-tab="wrongbook" style="font-size:11px;padding:5px 10px;">🔖 错题本</button>
    </nav>

    <div id="contentArea"></div>
  </div>

  <!-- Vocab Popup Overlay -->
  <div id="vocabOverlay" style="display:none;"></div>

  <script src="data.js"></script>
  <script>
    // ==================== STATE ====================
    const state = {
      currentYear: '2025',
      currentTab: 'dictation',
      mode: 'instant', // 'instant' | 'batch'
      grammarAnswers: {},   // { id: 'A' } — for Language Usage
      grammarSubmitted: {}, // { id: true|false } — for Language Usage
      convAnswers: {},      // { id: 'A' } — for Listening Conversations
      convSubmitted: {},    // { id: true|false } — for Listening Conversations
      readingAnswers: {},   // { id: 'A' } — for Reading Comprehension
      readingSubmitted: {}, // { id: true|false } — for Reading Comprehension
      clozeAnswers: {},
      clozeSubmitted: false,
      listeningAnswers: {},
      listeningSubmitted: false,
      writingText: '',
      wrongBook: JSON.parse(localStorage.getItem('tem4_wrongbook') || '[]'),
      vocabBook: JSON.parse(localStorage.getItem('tem4_vocabbook') || '[]'),
    };

    function getCurrentExam() {
      return state.currentYear === '2024' ? TEM4_2024 : TEM4_2025;
    }

    function saveWrongBook() { localStorage.setItem('tem4_wrongbook', JSON.stringify(state.wrongBook)); }
    function saveVocabBook() { localStorage.setItem('tem4_vocabbook', JSON.stringify(state.vocabBook)); }

    function addToWrongBook(section, id, stem, userAnswer, correctAnswer, explanation) {
      if (!state.wrongBook.find(w => w.section === section && w.id === id)) {
        state.wrongBook.push({ section, id, stem, userAnswer, correctAnswer, explanation, year: state.currentYear, time: Date.now() });
      }
      saveWrongBook(); updateStats();
    }

    function removeFromWrongBook(section, id) {
      state.wrongBook = state.wrongBook.filter(w => !(w.section === section && w.id === id));
      saveWrongBook(); updateStats();
    }

    function updateStats() {
      let correct = 0, wrong = 0, total = 0;
      // Grammar
      Object.values(state.grammarSubmitted).forEach(v => { if (v) correct++; else wrong++; total++; });
      // Conversations
      Object.values(state.convSubmitted).forEach(v => { if (v) correct++; else wrong++; total++; });
      // Reading
      Object.values(state.readingSubmitted).forEach(v => { if (v) correct++; else wrong++; total++; });
      if (state.clozeSubmitted) {
        const exam = getCurrentExam();
        Object.keys(exam.cloze.answers).forEach(k => {
          if (state.clozeAnswers[k] === exam.cloze.answers[k]) correct++; else wrong++; total++;
        });
      }
      document.getElementById('correctCount').textContent = `✅ ${correct}`;
      document.getElementById('wrongCount').textContent = `❌ ${wrong}`;
      document.getElementById('totalCount').textContent = `📝 ${total}`;
      document.getElementById('vocabCount').textContent = state.vocabBook.length;
    }

    // ==================== VOCAB POPUP ====================
    function showVocabPopup(word) {
      const lower = word.toLowerCase().replace(/[^a-z-]/g, '');
      const entry = VOCABULARY[lower] || VOCABULARY[word];
      const isInBook = state.vocabBook.find(v => v.word === lower);

      const html = `
        <div class="vocab-overlay" onclick="if(event.target===this)closeVocabPopup()">
          <div class="vocab-card">
            <button class="close-btn" onclick="closeVocabPopup()">✕</button>
            <div class="vocab-word">${word}</div>
            <div class="vocab-phonetic">${entry ? entry.phonetic : ''}</div>
            ${entry ? `
              <div class="vocab-meaning">${entry.meaning}</div>
              <div class="vocab-example">📌 ${entry.example}</div>
            ` : `
              <div class="vocab-meaning" style="color:var(--text-secondary);">
                ⚠️ 该词暂未收录，点击下方按钮可手动添加到生词本。
              </div>
            `}
            <div class="vocab-actions">
              ${entry ? `<button class="btn btn-speak btn-sm" onclick="speakWord('${word}')">🔊 发音</button>` : ''}
              <button class="btn btn-add-vocab btn-sm ${isInBook ? 'added' : ''}" 
                onclick="toggleVocab('${word}', '${entry ? entry.phonetic : ''}', '${entry ? entry.meaning : ''}', '${entry ? entry.example : ''}')">
                ${isInBook ? '✓ 已加入生词本' : '📖 加入生词本'}
              </button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('vocabOverlay').innerHTML = html;
      document.getElementById('vocabOverlay').style.display = 'block';
    }

    function closeVocabPopup() {
      document.getElementById('vocabOverlay').style.display = 'none';
      updateStats();
    }

    function speakWord(word) {
      if ('speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance(word);
        u.lang = 'en-US'; u.rate = 0.9;
        speechSynthesis.speak(u);
      }
    }

    function toggleVocab(word, phonetic, meaning, example) {
      const lower = word.toLowerCase().replace(/[^a-z-]/g, '');
      const idx = state.vocabBook.findIndex(v => v.word === lower);
      if (idx >= 0) {
        state.vocabBook.splice(idx, 1);
      } else {
        state.vocabBook.push({ word: lower, display: word, phonetic, meaning, example, time: Date.now() });
      }
      saveVocabBook();
      // Refresh popup button
      const btn = document.querySelector('.btn-add-vocab');
      const isInBook = state.vocabBook.find(v => v.word === lower);
      if (btn) {
        btn.textContent = isInBook ? '✓ 已加入生词本' : '📖 加入生词本';
        btn.className = `btn btn-add-vocab btn-sm ${isInBook ? 'added' : ''}`;
      }
      updateStats();
    }

    // ==================== WORD CLICK HANDLER ====================
    let _wordTooltip = null;
    let _tooltipTimer = null;

    function showWordTooltip(e) {
      const target = e.target.closest('[data-word]');
      if (!target) return;
      const word = target.dataset.word;
      if (!word || word.length < 3) return;

      const lower = word.toLowerCase().replace(/[^a-z-]/g, '');
      const entry = VOCABULARY[lower] || VOCABULARY[word];

      if (_wordTooltip) { _wordTooltip.remove(); _wordTooltip = null; }
      if (_tooltipTimer) { clearTimeout(_tooltipTimer); _tooltipTimer = null; }

      _tooltipTimer = setTimeout(() => {
        const rect = target.getBoundingClientRect();
        const tooltip = document.createElement('div');
        tooltip.className = 'word-tooltip';
        if (entry) {
          tooltip.innerHTML = `
            <div class="wt-word">${word}</div>
            <div class="wt-phonetic">${entry.phonetic}</div>
            <div class="wt-meaning">${entry.meaning}</div>
            <div class="wt-example">📌 ${entry.example}</div>`;
        } else {
          tooltip.innerHTML = `
            <div class="wt-word">${word}</div>
            <div class="wt-not-found">⚠️ 暂未收录，点击查词</div>`;
        }
        document.body.appendChild(tooltip);
        _wordTooltip = tooltip;

        // Position tooltip above the word
        let top = rect.top - tooltip.offsetHeight - 8;
        let left = rect.left;
        if (top < 8) top = rect.bottom + 8; // Show below if not enough space above
        if (left + tooltip.offsetWidth > window.innerWidth - 8) left = window.innerWidth - tooltip.offsetWidth - 8;
        if (left < 8) left = 8;
        tooltip.style.left = left + 'px';
        tooltip.style.top = top + 'px';
      }, 300);
    }

    function hideWordTooltip(e) {
      if (_tooltipTimer) { clearTimeout(_tooltipTimer); _tooltipTimer = null; }
      if (_wordTooltip) { _wordTooltip.remove(); _wordTooltip = null; }
    }

    function handleWordClick(e) {
      const selection = window.getSelection().toString().trim();
      if (selection) return; // Don't intercept text selection
      
      const target = e.target.closest('[data-word]');
      if (!target) return;
      
      const word = target.dataset.word;
      if (word && word.length > 2) {
        hideWordTooltip();
        showVocabPopup(word);
      }
    }

    // Global delegation for word hover
    document.addEventListener('mouseover', (e) => {
      if (e.target.closest('[data-word]')) showWordTooltip(e);
    }, { passive: true });
    document.addEventListener('mouseout', (e) => {
      if (e.target.closest('[data-word]') && !e.relatedTarget?.closest('[data-word]')) hideWordTooltip(e);
    }, { passive: true });

    // ==================== GRAMMAR ====================
    function wrapWords(text) {
      // Wrap each English word with a span for click/hover handling
      return text.replace(/([A-Za-z][A-Za-z-']*[A-Za-z])/g, (match) => {
        return `<span data-word="${match}" class="word-clickable">${match}</span>`;
      });
    }

    function renderGrammar() {
      const exam = getCurrentExam();
      const questions = exam.languageUsage;
      let html = '';

      // Grammar Instructions — always visible
      html += `
        <div class="card">
          <div class="card-title">📋 考试说明</div>
          <div style="white-space:pre-line; font-size:13px; line-height:1.8; padding:14px; background:#f0f9ff; border-radius:10px; color:var(--text-secondary);">
            ${exam.examInstructions ? exam.examInstructions.grammar : ''}
          </div>
        </div>
      `;
      
      questions.forEach((q, idx) => {
        const submitted = state.grammarSubmitted[q.id];
        const userAnswer = state.grammarAnswers[q.id];
        const isCorrect = submitted && userAnswer === q.answer;
        
        html += `
          <div class="card" onclick="handleWordClick(event)">
            <div class="q-stem">
              <span class="q-num ${submitted ? (isCorrect ? 'correct' : 'wrong') : ''}">${idx + 11}</span>
              <span>${wrapWords(q.stem)}</span>
            </div>
            <div class="options-list">
              ${Object.entries(q.options).map(([letter, text]) => `
                <button class="opt-btn 
                  ${userAnswer === letter ? 'selected' : ''}
                  ${submitted && letter === q.answer ? 'correct' : ''}
                  ${submitted && userAnswer === letter && letter !== q.answer ? 'wrong' : ''}
                  ${submitted ? 'disabled' : ''}"
                  data-id="${q.id}" data-letter="${letter}"
                  onclick="event.stopPropagation(); selectGrammar('${q.id}', '${letter}')">
                  <span class="opt-letter">${letter}</span>
                  <span>${text}</span>
                </button>
              `).join('')}
            </div>
            <div class="explanation ${submitted ? 'show' : ''}">
              ${submitted ? `
                <span class="exp-tag ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓ 正确' : '✗ 错误'}</span>
                <br><strong>解析：</strong>${q.explanation}
              ` : ''}
            </div>
            ${!submitted ? `
              <div class="actions">
                <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); submitGrammar('${q.id}')">确认答案</button>
              </div>
            ` : ''}
          </div>
        `;
      });

      if (state.mode === 'batch' && Object.keys(state.grammarAnswers).length > 0 && 
          Object.keys(state.grammarSubmitted).length < questions.length) {
        html = `
          <div style="text-align:center; margin-bottom:16px;">
            <button class="btn btn-primary" onclick="submitAllGrammar()">
              📋 提交全部答案（${Object.keys(state.grammarAnswers).length}/${questions.length} 已作答）
            </button>
            <button class="btn btn-outline" onclick="resetAllGrammar()" style="margin-left:8px;">重置全部</button>
          </div>
        ` + html;
      }

      document.getElementById('contentArea').innerHTML = html;
    }

    // Helper: find a question by ID across all sections
    function findQuestionById(id) {
      const exam = getCurrentExam();
      // Check Language Usage
      const gq = exam.languageUsage.find(q => q.id === id);
      if (gq) return { q: gq, type: 'grammar' };
      // Check Conversation One
      const c1q = (exam.conversationOne || []).find(q => q.id === id);
      if (c1q) return { q: c1q, type: 'conv' };
      // Check Conversation Two
      const c2q = (exam.conversationTwo || []).find(q => q.id === id);
      if (c2q) return { q: c2q, type: 'conv' };
      // Check Reading
      if (exam.reading && exam.reading.passages) {
        for (const p of exam.reading.passages) {
          const rq = p.questions.find(q => q.id === id);
          if (rq) return { q: rq, type: 'reading' };
        }
      }
      return null;
    }

    // Get answer/submitted maps for a given question type
    function getAnswerMaps(type) {
      if (type === 'conv') return { answers: state.convAnswers, submitted: state.convSubmitted };
      if (type === 'reading') return { answers: state.readingAnswers, submitted: state.readingSubmitted };
      return { answers: state.grammarAnswers, submitted: state.grammarSubmitted };
    }

    function selectGrammar(id, letter) {
      const found = findQuestionById(id);
      if (!found) return;
      const { answers, submitted } = getAnswerMaps(found.type);
      if (submitted[id]) return;
      answers[id] = letter;
      
      if (state.mode === 'instant') {
        // Instant mode: auto-submit
        const isCorrect = letter === found.q.answer;
        submitted[id] = isCorrect;
        if (!isCorrect) {
          addToWrongBook(found.type, id, found.q.stem.substring(0, 50) + '...', letter, found.q.answer, found.q.explanation);
        }
        updateStats();
      }
      // Re-render current tab
      switchTab(state.currentTab);
    }

    function submitGrammar(id) {
      const found = findQuestionById(id);
      if (!found) return;
      const { answers, submitted } = getAnswerMaps(found.type);
      const userAnswer = answers[id];
      if (!userAnswer) { alert('请先选择一个选项'); return; }
      const isCorrect = userAnswer === found.q.answer;
      submitted[id] = isCorrect;
      if (!isCorrect) {
        addToWrongBook(found.type, id, found.q.stem.substring(0, 50) + '...', userAnswer, found.q.answer, found.q.explanation);
      }
      updateStats();
      switchTab(state.currentTab);
    }

    function submitAllGrammar() {
      const exam = getCurrentExam();
      exam.languageUsage.forEach(q => {
        if (state.grammarAnswers[q.id] && state.grammarSubmitted[q.id] === undefined) {
          const userAnswer = state.grammarAnswers[q.id];
          const isCorrect = userAnswer === q.answer;
          state.grammarSubmitted[q.id] = isCorrect;
          if (!isCorrect) {
            addToWrongBook('grammar', q.id, q.stem.substring(0, 50) + '...', userAnswer, q.answer, q.explanation);
          }
        }
      });
      updateStats();
      renderGrammar();
    }

    function resetAllGrammar() {
      state.grammarAnswers = {};
      state.grammarSubmitted = {};
      updateStats();
      renderGrammar();
    }

    // ==================== CLOZE ====================
    function renderCloze() {
      const exam = getCurrentExam();
      const cloze = exam.cloze;
      
      let passageHtml = cloze.passage;
      // Replace blanks
      for (let i = 31; i <= 40; i++) {
        const userWord = state.clozeAnswers[i];
        const wordText = userWord ? cloze.wordBank.find(w => w.key === userWord)?.word || '' : '';
        const cls = userWord ? (cloze.answers[i] === userWord ? 'filled' : 'wrong-fill') : '';
        const selectedCls = state._clozeSelectedBlank === i ? 'selected' : '';
        const replacement = `<span class="cloze-blank ${cls} ${selectedCls}" data-blank="${i}" onclick="event.stopPropagation(); selectClozeBlank(${i})">${wordText || '(' + i + ')________'}</span>`;
        passageHtml = passageHtml.replace(`(${i})________`, replacement);
      }
      passageHtml = passageHtml.replace(/\(36\)"________"/g, (match) => {
        const i = 36; const userWord = state.clozeAnswers[i];
        const wordText = userWord ? cloze.wordBank.find(w => w.key === userWord)?.word || '' : '';
        const cls = userWord ? (cloze.answers[i] === userWord ? 'filled' : 'wrong-fill') : '';
        const selectedCls = state._clozeSelectedBlank === i ? 'selected' : '';
        return `<span class="cloze-blank ${cls} ${selectedCls}" data-blank="${i}" onclick="event.stopPropagation(); selectClozeBlank(${i})">${wordText || '(36)________'}</span>`;
      });

      // Wrap words in passage (but NOT inside HTML tags)
      passageHtml = passageHtml.replace(/(>|^)([^<]+)(<|$)/g, (_, before, text, after) => {
        const wrapped = text.replace(/([A-Za-z][A-Za-z-']*[A-Za-z])/g, (m) => {
          if (m.includes('________')) return m;
          return `<span data-word="${m}" class="word-clickable">${m}</span>`;
        });
        return before + wrapped + after;
      });

      let html = '';

      // Cloze Instructions — always visible
      html += `
        <div class="card">
          <div class="card-title">📋 考试说明</div>
          <div style="white-space:pre-line; font-size:13px; line-height:1.8; padding:14px; background:#f0f9ff; border-radius:10px; color:var(--text-secondary);">
            ${exam.examInstructions ? exam.examInstructions.cloze : ''}
          </div>
        </div>
      `;

      html += `
        <div class="card" onclick="handleWordClick(event)">
          <div class="card-title">✏️ 第四部分 完形填空（${exam.year}年）</div>
          <div class="cloze-passage">${passageHtml}</div>
          <div style="font-weight:600; margin-bottom:6px; color:var(--text-secondary); font-size:13px;">📋 词库（先点击空格，再选择单词）：</div>
          <div class="word-bank">
            ${cloze.wordBank.map(w => `
              <button class="word-chip 
                ${Object.values(state.clozeAnswers).includes(w.key) ? 'used' : ''}
                ${state._clozeSelectedWord === w.key ? 'active' : ''}"
                data-key="${w.key}" 
                onclick="event.stopPropagation(); selectClozeWord('${w.key}')"
                ${state.clozeSubmitted ? 'disabled' : ''}>
                ${w.key}. ${w.word}
              </button>
            `).join('')}
          </div>
          <div class="actions">
            ${!state.clozeSubmitted ? `
              <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); submitCloze()">提交全部</button>
              <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); resetCloze()">重置</button>
            ` : `
              <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); resetCloze()">重新作答</button>
            `}
          </div>
        </div>
      `;

      if (state.clozeSubmitted) {
        const correctCount = Object.keys(cloze.answers).filter(k => state.clozeAnswers[k] === cloze.answers[k]).length;
        html += `
          <div style="margin-top:14px;">
            <button class="btn btn-outline btn-sm" onclick="toggleClozeRef()">
              📋 参考答案 ${state._clozeRefVisible ? '▲ 收起' : '▼ 展开'}
            </button>
          </div>
          <div id="clozeRefContent" style="${state._clozeRefVisible ? '' : 'display:none;'} margin-top:8px;">
            <div class="card">
              <div class="score-card">
                <div class="score-circle"><span class="score-number">${correctCount}</span><span style="font-size:12px;color:var(--text-secondary);">/ 10</span></div>
                <h3>${correctCount >= 8 ? '🎉 优秀！' : correctCount >= 6 ? '👍 不错！' : '💪 继续加油！'}</h3>
              </div>
              ${Object.keys(cloze.answers).map(k => {
                const correct = state.clozeAnswers[k] === cloze.answers[k];
                return `
                  <div class="explanation show" style="margin-top:10px;">
                    <span class="exp-tag ${correct ? 'correct' : 'wrong'}">${correct ? '✓' : '✗'} 第${k}题</span>
                    <br>你的：<strong>${state.clozeAnswers[k] ? cloze.wordBank.find(w => w.key === state.clozeAnswers[k])?.word : '未作答'}</strong> 
                    | 正确答案：<strong>${cloze.wordBank.find(w => w.key === cloze.answers[k])?.word}</strong>
                    <br>${cloze.explanations[k] || ''}
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }

      document.getElementById('contentArea').innerHTML = html;
    }

    function selectClozeBlank(blankNum) {
      if (state.clozeSubmitted) return;
      state._clozeSelectedBlank = blankNum;
      state._clozeSelectedWord = state.clozeAnswers[blankNum] || null;
      renderCloze();
    }

    function selectClozeWord(key) {
      if (state.clozeSubmitted) return;
      if (!state._clozeSelectedBlank) { alert('请先在文章中点击要填的空格'); return; }
      if (state.clozeAnswers[state._clozeSelectedBlank] === key) {
        delete state.clozeAnswers[state._clozeSelectedBlank];
      } else {
        Object.keys(state.clozeAnswers).forEach(k => { if (state.clozeAnswers[k] === key) delete state.clozeAnswers[k]; });
        state.clozeAnswers[state._clozeSelectedBlank] = key;
      }
      state._clozeSelectedWord = state.clozeAnswers[state._clozeSelectedBlank] || null;
      renderCloze();
    }

    function toggleClozeRef() { state._clozeRefVisible = !state._clozeRefVisible; renderCloze(); }

    function submitCloze() {
      const exam = getCurrentExam();
      const cloze = exam.cloze;
      if (!confirm(`确定提交全部答案吗？`)) return;
      state.clozeSubmitted = true;
      state._clozeRefVisible = false;
      Object.keys(cloze.answers).forEach(k => {
        if (state.clozeAnswers[k] !== cloze.answers[k]) {
          addToWrongBook('cloze', k, `${exam.year}年第${k}空`,
            state.clozeAnswers[k] ? cloze.wordBank.find(w => w.key === state.clozeAnswers[k])?.word : '未作答',
            cloze.wordBank.find(w => w.key === cloze.answers[k])?.word,
            cloze.explanations[k] || '');
        }
      });
      updateStats();
      renderCloze();
    }

    function resetCloze() {
      state.clozeAnswers = {}; state.clozeSubmitted = false;
      state._clozeSelectedBlank = null; state._clozeSelectedWord = null;
      state._clozeRefVisible = false;
      renderCloze();
    }

    // ==================== LISTENING ====================
    // Audio state
    const audioState = { playing: false, speed: 1.0, currentTime: 0, duration: 0 };

    function getAudioSrc(year, type) {
      // type: 'dictation' or 'listening'
      // Use relative path that works both locally and on GitHub Pages
      if (type === 'dictation') {
        return `audio/${year}-dictation.mp3`;
      } else {
        return `audio/${year}-listening-comp.mp3`;
      }
    }

    // Helper: Preload audio and handle errors for GitHub Pages
    function preloadAudio(audioEl, src) {
      // Try to set crossOrigin for CORS issues on GitHub Pages
      try { audioEl.crossOrigin = 'anonymous'; } catch(e) {}
      audioEl.src = src;
      audioEl.load();
      // Log for debugging GitHub Pages issues
      audioEl.addEventListener('error', function(e) {
        const target = e.target;
        console.error('Audio load error:', {
          src: target.src,
          error: target.error ? target.error.message : 'unknown',
          networkState: target.networkState,
          readyState: target.readyState
        });
        const totalEl = document.getElementById('apTotalTime');
        if (totalEl) totalEl.textContent = '⚠️ 加载失败';
        // Try showing a helpful message on mobile
        const apInfo = document.querySelector('.ap-info');
        if (apInfo) {
          apInfo.style.color = '#fca5a5';
          apInfo.textContent += ' (音频加载失败，请检查文件是否存在)';
        }
      });
      // Log success for debugging
      audioEl.addEventListener('loadedmetadata', function() {
        console.log('Audio loaded successfully:', src);
        const apInfo = document.querySelector('.ap-info');
        if (apInfo) {
          apInfo.style.color = ''; // reset color
        }
      });
    }

    function formatTime(seconds) {
      if (isNaN(seconds)) return '00:00';
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function setupAudioPlayer(startFromSec = 0, audioType = 'listening') {
      const audio = document.getElementById('tem4Audio');
      if (!audio) return;

      // Preload the correct audio clip for this section
      const exam = getCurrentExam();
      preloadAudio(audio, getAudioSrc(exam.year, audioType));

      audio.playbackRate = audioState.speed;

      // Fix mobile: if duration already loaded from metadata
      if (audio.duration && !isNaN(audio.duration)) {
        audioState.duration = audio.duration;
        const totalEl = document.getElementById('apTotalTime');
        if (totalEl) totalEl.textContent = formatTime(audio.duration);
      }

      audio.addEventListener('loadedmetadata', () => {
        audioState.duration = audio.duration;
        const totalEl = document.getElementById('apTotalTime');
        if (totalEl) totalEl.textContent = formatTime(audio.duration);
      });

      audio.addEventListener('timeupdate', () => {
        audioState.currentTime = audio.currentTime;
        const pct = audioState.duration ? (audio.currentTime / audioState.duration) * 100 : 0;
        const fill = document.getElementById('apProgressFill');
        if (fill) fill.style.width = pct + '%';
        const curEl = document.getElementById('apCurrentTime');
        if (curEl) curEl.textContent = formatTime(audio.currentTime);
      });

      audio.addEventListener('play', () => {
        audioState.playing = true;
        const btn = document.getElementById('btnPlayPause');
        if (btn) { btn.classList.add('playing'); btn.textContent = '⏸'; }
      });

      audio.addEventListener('pause', () => {
        audioState.playing = false;
        const btn = document.getElementById('btnPlayPause');
        if (btn) { btn.classList.remove('playing'); btn.textContent = '▶'; }
      });

      audio.addEventListener('ended', () => {
        audioState.playing = false;
        audioState.currentTime = 0;
        const btn = document.getElementById('btnPlayPause');
        if (btn) { btn.classList.remove('playing'); btn.textContent = '▶'; }
      });

      // Handle mobile load errors gracefully
      audio.addEventListener('error', () => {
        const totalEl = document.getElementById('apTotalTime');
        if (totalEl) totalEl.textContent = '加载失败';
        console.warn('Audio failed to load:', audio.src);
      });

      // If audio was previously loaded, set its time
      if (audioState.currentTime > 0 && audio.readyState >= 2) {
        audio.currentTime = audioState.currentTime;
      }
    }

    function togglePlay() {
      const audio = document.getElementById('tem4Audio');
      if (!audio) return;
      if (audio.paused) {
        // Mobile requires user gesture. play() returns a promise.
        const playPromise = audio.play();
        if (playPromise !== undefined) {
          playPromise.catch((err) => {
            console.warn('Playback prevented:', err.message);
            // Show a hint for mobile users
            alert('⚠️ 请点击播放按钮开始播放音频。如果仍无法播放，请检查网络连接。');
          });
        }
      } else {
        audio.pause();
      }
    }

    function seekAudio(e) {
      const audio = document.getElementById('tem4Audio');
      if (!audio || !audioState.duration) return;
      const bar = e.currentTarget;
      const rect = bar.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      audio.currentTime = pct * audioState.duration;
    }

    function changeSpeed() {
      const audio = document.getElementById('tem4Audio');
      if (!audio) return;
      const speeds = [0.75, 1.0, 1.25, 1.5];
      const currentIdx = speeds.indexOf(audioState.speed);
      const nextIdx = (currentIdx + 1) % speeds.length;
      audioState.speed = speeds[nextIdx];
      audio.playbackRate = audioState.speed;
      const btn = document.getElementById('btnSpeed');
      if (btn) btn.textContent = audioState.speed + '×';
      // Update active class
      document.querySelectorAll('.ap-speed-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
    }

    function jumpToTime(seconds) {
      const audio = document.getElementById('tem4Audio');

                  ${userAnswer === letter ? 'selected' : ''}

                  ${submitted && userAnswer === letter && letter !== q.answer ? 'wrong' : ''}
                  ${submitted ? 'disabled' : ''}"
                  data-id="${q.id}" data-letter="${letter}"
                  onclick="event.stopPropagation(); selectGrammar('${q.id}', '${letter}')">
                  <span class="opt-letter">${letter}</span>
                  <span>${text}</span>
                </button>
              `).join('')}
            </div>
            <div class="explanation ${submitted ? 'show' : ''}">
              ${submitted ? `<span class="exp-tag ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓ 正确' : '✗ 错误'}</span>
                <br><strong>解析：</strong>${q.explanation}` : ''}
            </div>
            ${!submitted ? `<div class="actions"><button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); submitGrammar('${q.id}')">确认答案</button></div>` : ''}
          </div>`;
        });
      });
      html += '</div>';

      // Section B - Short Answer Questions
      html += '<div class="card"><div class="card-title">📝 B节 — 简答题</div>';
      html += '<p style="color:var(--text-secondary);font-size:13px;margin-bottom:16px;">用不超过十个词作答。</p>';
      reading.shortAnswers.forEach(sa => {
        html += `
          <div class="short-answer-card">
            <div class="sa-stem">${sa.num}. ${sa.stem}</div>
            <div class="sa-ref" id="saRef${sa.num}" style="display:none;">📌 参考答案：${sa.reference}</div>
            <button class="btn btn-outline btn-sm" style="margin-top:6px;" onclick="toggleShortAnswer(${sa.num})">查看参考答案</button>
          </div>
        `;
      });
      html += '</div>';

      document.getElementById('contentArea').innerHTML = html;
    }

    const vocabDrillState = { filter: 'all', flipped: {} };

    function renderVocabDrill() {
      const filter = vocabDrillState.filter;
      const filtered = filter === 'all' ? DRILL_VOCAB : DRILL_VOCAB.filter(v => v.type === filter);

      const typeCounts = { all: DRILL_VOCAB.length, n: 0, v: 0, adj: 0 };
      DRILL_VOCAB.forEach(v => { typeCounts[v.type]++; });

      let html = `
        <div class="card">
          <div class="card-title">🔤 2025 TEM4 高频核心词汇（共 ${DRILL_VOCAB.length} 词）</div>
          <div class="hint-text">💡 点击单词可翻转查看释义。这些词汇来自2025年专四真题，是考试重点生词。</div>
          <div class="vocab-filter">
            <button class="vocab-filter-btn ${filter === 'all' ? 'active' : ''}" onclick="filterVocabDrill('all')">全部 (${typeCounts.all})</button>
            <button class="vocab-filter-btn ${filter === 'n' ? 'active' : ''}" onclick="filterVocabDrill('n')">名词 (${typeCounts.n})</button>
            <button class="vocab-filter-btn ${filter === 'v' ? 'active' : ''}" onclick="filterVocabDrill('v')">动词 (${typeCounts.v})</button>

            </div>
          `).join('')}
        </div>
      `;
      document.getElementById('contentArea').innerHTML = html;
    }

      vocabDrillState.filter = type;
      vocabDrillState.flipped = {};
      renderVocabDrill();
    }

    function flipVocabDrill(word) {
      vocabDrillState.flipped[word] = !vocabDrillState.flipped[word];
      renderVocabDrill();
    }

    // ==================== VOCAB BOOK ====================
    function renderVocabBook() {
      if (state.vocabBook.length === 0) {
        document.getElementById('contentArea').innerHTML = `
          <div class="card"><div class="empty-state"><div class="empty-icon">📖</div><h3>生词本为空</h3><p>点击题目中的任意英语单词即可查词并加入生词本</p></div></div>`;
        return;
      }
      let html = `
        <div class="card">
          <div class="card-title">📖 生词本（共 ${state.vocabBook.length} 词）</div>
          <button class="btn btn-danger btn-sm" onclick="clearVocabBook()" style="margin-bottom:12px;">清空生词本</button>
      `;
      state.vocabBook.forEach((v, idx) => {
        html += `
          <div class="vocab-item" onclick="showVocabPopup('${v.display}')">
            <div>
              <span class="v-word">${v.display}</span>
              <span class="v-phonetic">${v.phonetic}</span>
              <br><span class="v-meaning">${v.meaning}</span>
            </div>
            <button class="vocab-delete" onclick="event.stopPropagation(); deleteVocab(${idx})">移除</button>
          </div>
        `;
      });
      html += '</div>';
      document.getElementById('contentArea').innerHTML = html;
    }

    function deleteVocab(idx) { state.vocabBook.splice(idx, 1); saveVocabBook(); updateStats(); renderVocabBook(); }
    function clearVocabBook() {
      if (confirm('确定清空生词本？')) { state.vocabBook = []; saveVocabBook(); updateStats(); renderVocabBook(); }
    }

    // ==================== TAB SWITCHING ====================
    function switchTab(tab) {
      state.currentTab = tab;
      // Remove active from ALL nav-tabs in both rows
      document.querySelectorAll('#navTabs .nav-tab, #navSubTabs .nav-tab').forEach(el => el.classList.remove('active'));
      const tabEl = document.querySelector(`[data-tab="${tab}"]`);
      if (tabEl) tabEl.classList.add('active');
      
      switch (tab) {
        case 'dictation': renderDictation(); break;
        case 'listening': renderListening(); break;
        case 'grammar': renderGrammar(); break;
        case 'cloze': renderCloze(); break;
        case 'reading': renderReading(); break;
        case 'writing': renderWriting(); break;
        case 'vocabdrill': renderVocabDrill(); break;
        case 'wrongbook': renderWrongBook(); break;
        case 'vocabbook': renderVocabBook(); break;
      }
    }

    document.getElementById('navTabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.nav-tab');
      if (tab) switchTab(tab.dataset.tab);
    });
    document.getElementById('navSubTabs').addEventListener('click', (e) => {
      const tab = e.target.closest('.nav-tab');
      if (tab) switchTab(tab.dataset.tab);
    });

    // Year selector
    document.getElementById('yearSelector').addEventListener('click', (e) => {
      const btn = e.target.closest('.year-btn');
      if (!btn) return;
      state.currentYear = btn.dataset.year;
      document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Reset answers for new year
      state.grammarAnswers = {}; state.grammarSubmitted = {};
      state.convAnswers = {}; state.convSubmitted = {};
      state.readingAnswers = {}; state.readingSubmitted = {};
      state.clozeAnswers = {}; state.clozeSubmitted = false;
      state.listeningAnswers = {}; state.listeningSubmitted = false;
      state.writingText = '';
      // Reset audio state
      audioState.playing = false; audioState.currentTime = 0; audioState.duration = 0;
      updateStats();
      switchTab(state.currentTab);
    });

    // Mode toggle
    document.querySelector('.mode-toggle').addEventListener('click', (e) => {
      const btn = e.target.closest('.mode-btn');
      if (!btn) return;
      state.mode = btn.dataset.mode;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Reset grammar/conversation/reading to allow re-answering
      state.grammarAnswers = {}; state.grammarSubmitted = {};
      state.convAnswers = {}; state.convSubmitted = {};
      state.readingAnswers = {}; state.readingSubmitted = {};
      updateStats();
      if (state.currentTab === 'grammar') renderGrammar();
    });

    // Close vocab on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeVocabPopup();
    });

    // ==================== INIT ====================
    function init() {
      updateStats();
      renderDictation();
    }
    init();
